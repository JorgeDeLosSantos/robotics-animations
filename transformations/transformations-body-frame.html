<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Homogeneous Transformations - Body-Fixed Pure</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; display: flex; background: #111; }
        #ui-panel {
            width: 350px; height: 100vh; background: rgba(255,255,255,0.95);
            position: absolute; left: 0; top: 0; z-index: 10;
            padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.3);
            overflow-y: auto; box-sizing: border-box;
        }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #333; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .matrix-display {
            background: #1e1e1e; color: #4ade80; font-family: 'Consolas', monospace;
            padding: 15px; border-radius: 8px; font-size: 11px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            border: 1px solid #444; margin-top: 10px;
        }
        .info-box { 
            background: #e0f2fe; border-left: 4px solid #0ea5e9; 
            padding: 10px; font-size: 12px; margin-bottom: 20px; color: #0369a1;
        }
        button { 
            width: 100%; padding: 12px; background: #ef4444; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #dc2626; }
        span.val { float: right; color: #2563eb; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>Cinemática 3D</h2>
    <div class="info-box">
        <strong>Modo: Sistema Móvil</strong><br>
        Cada movimiento se aplica respecto a los ejes actuales del cuerpo.
    </div>

    <div class="control-group">
        <label>Traslación Local X <span id="tx-val" class="val">0</span></label>
        <input type="range" id="tx" min="-10" max="10" step="0.1" value="0">
        
        <label>Traslación Local Y <span id="ty-val" class="val">0</span></label>
        <input type="range" id="ty" min="-10" max="10" step="0.1" value="0">

        <label>Traslación Local Z <span id="tz-val" class="val">0</span></label>
        <input type="range" id="tz" min="-10" max="10" step="0.1" value="0">
    </div>

    <div class="control-group">
        <label>Rotación Local X <span id="rx-val" class="val">0</span>°</label>
        <input type="range" id="rx" min="-180" max="180" step="1" value="0">
        
        <label>Rotación Local Y <span id="ry-val" class="val">0</span>°</label>
        <input type="range" id="ry" min="-180" max="180" step="1" value="0">

        <label>Rotación Local Z <span id="rz-val" class="val">0</span>°</label>
        <input type="range" id="rz" min="-180" max="180" step="1" value="0">
    </div>

    <button id="reset">Resetear Identidad</button>

    <label style="margin-top:20px">Matriz Homogénea T (Body to World)</label>
    <div class="matrix-display" id="matrix-ui"></div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Escena y Cámara
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(10, 10, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);

    // Ayudas visuales
    scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
    const worldAxes = new THREE.AxesHelper(5);
    scene.add(worldAxes); // Sistema Fijo

    // Objeto y Sistema Móvil
    const geometry = new THREE.BoxGeometry(2, 1, 0.5);
    const material = new THREE.MeshPhongMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.9 });
    const cube = new THREE.Mesh(geometry, material);
    
    // El AxesHelper hijo hereda la matriz del padre
    const bodyAxes = new THREE.AxesHelper(3);
    cube.add(bodyAxes);
    scene.add(cube);

    // IMPORTANTE: Desactivar el auto-update para control manual de matriz
    cube.matrixAutoUpdate = false;

    // Iluminación (Corregida)
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light);

    // --- LÓGICA DE TRANSFORMACIÓN ACUMULATIVA ---

    let params = { tx: 0, ty: 0, tz: 0, rx: 0, ry: 0, rz: 0 };
    let prevParams = { tx: 0, ty: 0, tz: 0, rx: 0, ry: 0, rz: 0 };
    let T_actual = new THREE.Matrix4(); // Identidad inicial

    function updateTransform() {
        // Calcular incrementos (deltas)
        const dt = {
            x: params.tx - prevParams.tx,
            y: params.ty - prevParams.ty,
            z: params.tz - prevParams.tz,
            rx: THREE.MathUtils.degToRad(params.rx - prevParams.rx),
            ry: THREE.MathUtils.degToRad(params.ry - prevParams.ry),
            rz: THREE.MathUtils.degToRad(params.rz - prevParams.rz)
        };

        // Crear matriz incremental paso a paso
        const mDelta = new THREE.Matrix4();
        
        // 1. Aplicar traslaciones del paso al mDelta
        mDelta.multiply(new THREE.Matrix4().makeTranslation(dt.x, dt.y, dt.z));
        
        // 2. Aplicar rotaciones del paso al mDelta
        mDelta.multiply(new THREE.Matrix4().makeRotationX(dt.rx));
        mDelta.multiply(new THREE.Matrix4().makeRotationY(dt.ry));
        mDelta.multiply(new THREE.Matrix4().makeRotationZ(dt.rz));

        // 3. POST-MULTIPLICACIÓN: T_n = T_{n-1} * M_delta
        // Esto hace que el movimiento sea relativo al sistema móvil
        T_actual.multiply(mDelta);

        // Actualizar el objeto
        cube.matrix.copy(T_actual);
        cube.matrixWorldNeedsUpdate = true;

        // Sincronizar estados
        prevParams = { ...params };
        updateMatrixUI(T_actual);
    }

    // function updateMatrixUI(m) {
    //     const ui = document.getElementById('matrix-ui');
    //     ui.innerHTML = '';
    //     // Three.js usa column-major, lo mostramos para que coincida visualmente
    //     m.elements.forEach(val => {
    //         const el = document.createElement('div');
    //         el.textContent = val.toFixed(2);
    //         ui.appendChild(el);
    //     });
    // }

    function updateMatrixUI(m) {
        const ui = document.getElementById('matrix-ui');
        ui.innerHTML = '';
        
        const te = m.elements;

        // Ejecutamos un bucle anidado para transformar 
        // visualmente de columnas a filas
        for (let i = 0; i < 4; i++) { // i = Fila
            for (let j = 0; j < 4; j++) { // j = Columna
                const el = document.createElement('div');
                
                // Fórmula: (Columna * 4) + Fila
                const index = j * 4 + i; 
                
                el.textContent = te[index].toFixed(2);
                ui.appendChild(el);
            }
        }
    }

    // --- EVENTOS ---
    const inputs = ['tx', 'ty', 'tz', 'rx', 'ry', 'rz'];
    inputs.forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', (e) => {
            params[id] = parseFloat(e.target.value);
            document.getElementById(`${id}-val`).textContent = params[id];
            updateTransform();
        });
    });

    document.getElementById('reset').onclick = () => {
        T_actual.identity();
        inputs.forEach(id => {
            params[id] = 0;
            prevParams[id] = 0;
            document.getElementById(id).value = 0;
            document.getElementById(`${id}-val`).textContent = 0;
        });
        updateTransform();
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    updateMatrixUI(T_actual);
    animate();

</script>
</body>
</html>
