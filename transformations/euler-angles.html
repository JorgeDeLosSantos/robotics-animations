<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Ángulos de Euler - Intrínseco vs Extrínseco</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; display: flex; background: #0a0a0a; }
        #ui-panel {
            width: 380px; height: 100vh; background: rgba(255,255,255,0.95);
            position: absolute; left: 0; top: 0; z-index: 10;
            padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            overflow-y: auto; box-sizing: border-box;
        }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; color: #333; }
        select, input[type="range"] { width: 100%; margin-bottom: 10px; }
        .matrix-display {
            background: #1a1a1a; color: #00ffcc; font-family: 'Consolas', monospace;
            padding: 15px; border-radius: 8px; font-size: 12px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            border: 1px solid #333; margin-top: 10px;
        }
        .type-indicator {
            padding: 8px; border-radius: 4px; text-align: center; font-weight: bold;
            margin-bottom: 15px; font-size: 12px;
        }
        .intrinsic { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .extrinsic { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .val { float: right; color: #2563eb; font-weight: bold; }
        button { 
            width: 100%; padding: 12px; background: #1e293b; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>Ángulos de Euler</h2>
    
    <div class="control-group">
        <label>Convención de Rotación</label>
        <select id="rotation-type">
            <option value="intrinsic">Intrínseca (Ejes Móviles)</option>
            <option value="extrinsic">Extrínseca (Ejes Fijos)</option>
        </select>
        <div id="mode-desc" class="type-indicator intrinsic">MODO: INTRÍNSECO (Post-multiplicación)</div>
    </div>

    <div class="control-group">
        <label>Secuencia</label>
        <select id="sequence">
            <option value="ZYX">ZYX (Aeronáutica / Yaw-Pitch-Roll)</option>
            <option value="XYZ">XYZ</option>
            <option value="ZYZ">ZYZ (Robótica Industrial)</option>
            <option value="ZXZ">ZXZ (Mecánica Clásica)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Ángulo 1 (α): <span id="a1-val" class="val">0</span>°</label>
        <input type="range" id="a1" min="-180" max="180" value="0">
        
        <label>Ángulo 2 (β): <span id="a2-val" class="val">0</span>°</label>
        <input type="range" id="a2" min="-180" max="180" value="0">

        <label>Ángulo 3 (γ): <span id="a3-val" class="val">0</span>°</label>
        <input type="range" id="a3" min="-180" max="180" value="0">
    </div>

    <button id="reset">Resetear Ángulos</button>

    <label style="margin-top:20px">Matriz de Rotación $R \in SO(3)$</label>
    <div class="matrix-display" id="matrix-ui"></div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Inicialización de Escena
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.GridHelper(10, 10, 0x333333, 0x222222));

    // Ejes del Mundo (Fijos)
    const worldAxes = new THREE.AxesHelper(5);
    scene.add(worldAxes);

    // Sistema Móvil (Cuerpo)
    const bodyGroup = new THREE.Group();
    const bodyAxes = new THREE.AxesHelper(3);
    bodyGroup.add(bodyAxes);
    
    // Geometría para referencia visual de orientación
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2, 0.5, 1),
        new THREE.MeshPhongMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.7 })
    );
    bodyGroup.add(mesh);
    scene.add(bodyGroup);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.PointLight(0xffffff, 100);
    light.position.set(5, 5, 5);
    scene.add(light);

    // Lógica Matemática
    let angles = { a1: 0, a2: 0, a3: 0 };
    let type = 'intrinsic';
    let sequence = 'ZYX';

    function getRotationMatrix(axis, theta) {
        const rad = THREE.MathUtils.degToRad(theta);
        const m = new THREE.Matrix4();
        if (axis === 'X') m.makeRotationX(rad);
        if (axis === 'Y') m.makeRotationY(rad);
        if (axis === 'Z') m.makeRotationZ(rad);
        return m;
    }

    function updateRotation() {
        const seqArray = sequence.split('');
        const m1 = getRotationMatrix(seqArray[0], angles.a1);
        const m2 = getRotationMatrix(seqArray[1], angles.a2);
        const m3 = getRotationMatrix(seqArray[2], angles.a3);

        let R = new THREE.Matrix4();

        if (type === 'intrinsic') {
            // INTRÍNSECO: R = R1 * R2 * R3 (Post-multiplicación)
            R.multiply(m1).multiply(m2).multiply(m3);
        } else {
            // EXTRÍNSECO: R = R3 * R2 * R1 (Pre-multiplicación)
            R.copy(m3).multiply(m2).multiply(m1);
        }

        bodyGroup.matrix.copy(R);
        bodyGroup.matrixAutoUpdate = false;
        bodyGroup.matrixWorldNeedsUpdate = true;

        updateUI(R);
    }

    function updateUI(matrix) {
        const ui = document.getElementById('matrix-ui');
        ui.innerHTML = '';
        const e = matrix.elements;
        // Solo mostramos la submatriz de rotación 3x3
        const indices = [0, 4, 8, 1, 5, 9, 2, 6, 10];
        indices.forEach(idx => {
            const cell = document.createElement('div');
            cell.textContent = e[idx].toFixed(3);
            ui.appendChild(cell);
        });
    }

    // Eventos
    document.getElementById('rotation-type').addEventListener('change', (e) => {
        type = e.target.value;
        const desc = document.getElementById('mode-desc');
        desc.textContent = `MODO: ${type.toUpperCase()} (${type === 'intrinsic' ? 'Post-multiplicación' : 'Pre-multiplicación'})`;
        desc.className = `type-indicator ${type}`;
        updateRotation();
    });

    document.getElementById('sequence').addEventListener('change', (e) => {
        sequence = e.target.value;
        updateRotation();
    });

    ['a1', 'a2', 'a3'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            angles[id] = parseFloat(e.target.value);
            document.getElementById(id + '-val').textContent = angles[id];
            updateRotation();
        });
    });

    document.getElementById('reset').onclick = () => {
        ['a1', 'a2', 'a3'].forEach(id => {
            angles[id] = 0;
            document.getElementById(id).value = 0;
            document.getElementById(id + '-val').textContent = 0;
        });
        updateRotation();
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    updateRotation();
    animate();
</script>
</body>
</html>
