<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Momento de Inercia</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --panel: #ffffff;
            --primary: #2563eb;
            --accent: #d97706;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Panel de Controles */
        #controls {
            width: 350px;
            background: var(--panel);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        /* Área del Canvas */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
        }

        canvas {
            background: #2a2a2a;
            cursor: crosshair;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* UI Elements */
        .stat-card {
            background: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid var(--primary);
        }

        .stat-value {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2em;
            color: #1e293b;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button.secondary { background: #64748b; }
        button.danger { background: #ef4444; }

        .instructions {
            font-size: 0.85em;
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="controls">
    <h2>Física Rotacional</h2>
    
    <div class="stat-card">
        <div>Momento de Inercia (I):</div>
        <div id="val-i" class="stat-value">0.00 kg·m²</div>
    </div>

    <div class="stat-card">
        <div>Velocidad Angular (ω):</div>
        <div id="val-w" class="stat-value">0.00 rad/s</div>
    </div>

    <div class="control-group">
        <label>Masa de nuevas partículas:</label>
        <input type="range" id="input-mass" min="1" max="100" value="10">
        <span id="label-mass">10 kg</span>
    </div>

    <div class="control-group">
        <label>Torque Constante (τ):</label>
        <input type="range" id="input-torque" min="0" max="500" value="0">
        <span id="label-torque">0 N·m</span>
    </div>

    <button id="btn-torque">Aplicar Impulso de Torque</button>
    <button id="btn-reset" class="secondary">Resetear Simulación</button>
    <button id="btn-clear" class="danger">Limpiar Partículas</button>

    <div class="control-group">
        <label><input type="checkbox" id="check-lines" checked> Mostrar radios (r)</label>
    </div>

    <div class="instructions">
        • Click: Agregar partícula<br>
        • Drag: Mover partícula o eje (centro azul)<br>
        • Click Derecho: Eliminar partícula
    </div>

    <hr>
    <small>Fórmula: $I = \sum m_i r_i^2$</small>
    <small>Dinámica: $\alpha = \frac{\tau}{I}$</small>
</div>

<div id="canvas-container">
    <canvas id="simCanvas"></canvas>
</div>

<script>
/**
 * CLASE PARTÍCULA
 */
class Particle {
    constructor(x, y, mass) {
        this.x = x;
        this.y = y;
        this.mass = mass;
        this.radius = 8 + (mass / 10); // Tamaño visual proporcional a masa
        this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
    }

    draw(ctx, pivot, showLines) {
        const r = Math.hypot(this.x - pivot.x, this.y - pivot.y);
        
        if (showLines) {
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.moveTo(pivot.x, pivot.y);
            ctx.lineTo(this.x, this.y);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.stroke();
        
        // Etiqueta de masa
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.fillText(`${this.mass}kg`, this.x + 10, this.y - 10);
    }
}

/**
 * MOTOR DE LA SIMULACIÓN
 */
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

let particles = [];
let pivot = { x: 0, y: 0, radius: 12 };
let isDragging = null; // Referencia al objeto que se arrastra

// Variables de estado físico
let theta = 0;      // Ángulo (rad)
let omega = 0;      // Velocidad angular (rad/s)
let alpha = 0;      // Aceleración angular (rad/s²)
let inertia = 0;
let torque = 0;

function init() {
    canvas.width = window.innerWidth - 350;
    canvas.height = window.innerHeight;
    pivot.x = canvas.width / 2;
    pivot.y = canvas.height / 2;
}

function calculateInertia() {
    // I = Σ m * r^2
    inertia = particles.reduce((acc, p) => {
        const r = Math.hypot(p.x - pivot.x, p.y - pivot.y) / 20; // Escala: 20px = 1m
        return acc + (p.mass * r * r);
    }, 0);
    
    document.getElementById('val-i').innerText = `${inertia.toFixed(2)} kg·m²`;
}

function updatePhysics() {
    if (inertia > 0.1) {
        alpha = torque / inertia;
        omega += alpha * 0.016; // Asumiendo 60fps (~0.016s)
        theta += omega * 0.016;
    } else {
        omega = 0;
        alpha = 0;
    }

    // Rotar todas las partículas respecto al eje
    if (Math.abs(omega) > 0) {
        particles.forEach(p => {
            const dx = p.x - pivot.x;
            const dy = p.y - pivot.y;
            const cos = Math.cos(omega * 0.016);
            const sin = Math.sin(omega * 0.016);
            
            p.x = pivot.x + (dx * cos - dy * sin);
            p.y = pivot.y + (dx * sin + dy * cos);
        });
    }

    document.getElementById('val-w').innerText = `${omega.toFixed(2)} rad/s`;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const showLines = document.getElementById('check-lines').checked;

    // Dibujar Eje de rotación
    ctx.beginPath();
    ctx.arc(pivot.x, pivot.y, pivot.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#2563eb";
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.stroke();

    // Dibujar partículas
    particles.forEach(p => p.draw(ctx, pivot, showLines));

    updatePhysics();
    requestAnimationFrame(draw);
}

/**
 * INTERACCIÓN Y EVENTOS
 */
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // Detectar si hacemos clic derecho (contextmenu se encarga de borrar)
    if (e.button === 2) return;

    // ¿Estamos arrastrando el eje?
    if (Math.hypot(mx - pivot.x, my - pivot.y) < pivot.radius) {
        isDragging = pivot;
        return;
    }

    // ¿Estamos arrastrando una partícula?
    const found = particles.find(p => Math.hypot(mx - p.x, my - p.y) < p.radius * 2);
    if (found) {
        isDragging = found;
    } else {
        // Crear nueva partícula
        const m = parseInt(document.getElementById('input-mass').value);
        particles.push(new Particle(mx, my, m));
        calculateInertia();
    }
});

canvas.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const rect = canvas.getBoundingClientRect();
    isDragging.x = e.clientX - rect.left;
    isDragging.y = e.clientY - rect.top;
    calculateInertia();
});

window.addEventListener('mouseup', () => isDragging = null);

// Eliminar partículas con click derecho
canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    particles = particles.filter(p => Math.hypot(mx - p.x, my - p.y) > p.radius * 2);
    calculateInertia();
});

// Controles de UI
document.getElementById('input-mass').oninput = (e) => {
    document.getElementById('label-mass').innerText = `${e.target.value} kg`;
};

document.getElementById('input-torque').oninput = (e) => {
    torque = parseFloat(e.target.value);
    document.getElementById('label-torque').innerText = `${torque} N·m`;
};

document.getElementById('btn-torque').onclick = () => {
    omega += 5; // Aplica un impulso súbito
};

document.getElementById('btn-reset').onclick = () => {
    omega = 0;
    alpha = 0;
    theta = 0;
};

document.getElementById('btn-clear').onclick = () => {
    particles = [];
    omega = 0;
    calculateInertia();
};

window.onresize = init;
init();
draw();
</script>
</body>
</html>
